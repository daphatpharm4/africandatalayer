        <circle cx="70" cy="80" r="34" fill="#0f2b46"/><path d="M70 54c-19 0-34 15-34 34 0 25 34 54 34 54s34-29 34-54c0-19-15-34-34-34z" fill="#fff" transform="translate(0 -18) scale(.48) translate(72 54)"/>
