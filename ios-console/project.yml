name: ADLConsole
options:
  bundleIdPrefix: com.africandatalayer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  ConsoleCore:
    path: Packages/ConsoleCore

targets:
  ADLConsole:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADLConsole
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.africandatalayer.console
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: ADL Console
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: ConsoleCore
        product: ConsoleModels
      - package: ConsoleCore
        product: ConsoleAPI
      - package: ConsoleCore
        product: ConsoleState

  ADLConsoleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADLConsoleTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ADLConsole
      - package: ConsoleCore
        product: ConsoleModels
      - package: ConsoleCore
        product: ConsoleAPI
      - package: ConsoleCore
        product: ConsoleState

schemes:
  ADLConsole:
    build:
      targets:
        ADLConsole: all
        ADLConsoleTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ADLConsoleTests
    archive:
      config: Release
