name: ADLConsole
options:
  bundleIdPrefix: com.africandatalayer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    ADL_BUILD_CHANNEL: production
    ADL_API_BASE_URL: https://www.app.africandatalayer.com

configs:
  Debug: debug
  Staging: release
  Release: release

packages:
  ConsoleCore:
    path: Packages/ConsoleCore

targets:
  ADLConsole:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADLConsole
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_ADL_BUILD_CHANNEL: "$(ADL_BUILD_CHANNEL)"
        INFOPLIST_KEY_ADL_API_BASE_URL: "$(ADL_API_BASE_URL)"
        INFOPLIST_KEY_CFBundleDisplayName: ADL Console
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"
        INFOPLIST_KEY_NSCameraUsageDescription: "ADL Console uses your camera to attach photo evidence to a captured record."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "ADL Console lets you attach a photo from your library as evidence for a captured record."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "ADL Console uses your location to attach a GPS fix as evidence for a captured record."
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - package: ConsoleCore
        product: ConsoleModels
      - package: ConsoleCore
        product: ConsoleAPI
      - package: ConsoleCore
        product: ConsoleState
      - package: ConsoleCore
        product: ConsoleForms
      - package: ConsoleCore
        product: ConsolePersistence

  ADLConsoleUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADLConsoleUITests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: ADLConsole

  ADLConsoleTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ADLConsoleTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
    configFiles:
      Debug: Config/Debug.xcconfig
      Staging: Config/Staging.xcconfig
      Release: Config/Release.xcconfig
    dependencies:
      - target: ADLConsole
      - package: ConsoleCore
        product: ConsoleModels
      - package: ConsoleCore
        product: ConsoleAPI
      - package: ConsoleCore
        product: ConsoleState
      - package: ConsoleCore
        product: ConsoleForms

schemes:
  ADLConsole-Debug:
    build:
      targets:
        ADLConsole: all
        ADLConsoleTests: [test]
        ADLConsoleUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ADLConsoleTests
        - ADLConsoleUITests
    archive:
      config: Debug

  ADLConsole-Staging:
    build:
      targets:
        ADLConsole: all
        ADLConsoleTests: [test]
        ADLConsoleUITests: [test]
    run:
      config: Staging
    test:
      config: Staging
      targets:
        - ADLConsoleTests
        - ADLConsoleUITests
    archive:
      config: Staging

  ADLConsole:
    build:
      targets:
        ADLConsole: all
        ADLConsoleTests: [test]
        ADLConsoleUITests: [test]
    run:
      config: Release
    test:
      config: Debug
      targets:
        - ADLConsoleTests
        - ADLConsoleUITests
    archive:
      config: Release
