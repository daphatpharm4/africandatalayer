name: CI

on:
  push:
    branches:
      - main
      - staging
      - feature/capacitor-base
      - feature/ios-distribution
      - feature/android-distribution
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install accessibility browser
        run: npx playwright install --with-deps chromium

      - name: Accessibility smoke tests
        run: npm run test:e2e:a11y

  android:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Test and assemble Android
        working-directory: android
        run: |
          set -o pipefail
          set +e
          log_file="$RUNNER_TEMP/android-gradle.log"
          ./gradlew testDebugUnitTest assembleDebug --stacktrace --console=plain 2>&1 | tee "$log_file"
          status="${PIPESTATUS[0]}"
          set -e
          if (( status != 0 )); then
            detail="$(grep -E '(^e: |^FAILURE:|^\* What went wrong:|Execution failed|error:|Could not resolve|Could not find)' "$log_file" | tail -n 20 | tr '\n' ' ')"
            detail="${detail//'%'/'%25'}"
            echo "::error file=android/app/build.gradle.kts::Android Gradle failure: ${detail:-see full job log}"
          fi
          exit "$status"
