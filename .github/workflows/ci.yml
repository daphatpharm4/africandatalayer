name: CI

on:
  push:
    branches:
      - main
      - staging
      - feature/capacitor-base
      - feature/ios-distribution
      - feature/android-distribution
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install accessibility browser
        run: npx playwright install --with-deps chromium

      - name: Accessibility smoke tests
        run: npm run test:e2e:a11y

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK 37
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-37" \
            "build-tools;37.0.0"

      - name: Test and assemble Android
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug
