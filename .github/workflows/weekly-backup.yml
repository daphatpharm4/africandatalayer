name: Weekly Backup

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  postgres-backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install PostgreSQL 17 Client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Install Dependencies
        run: npm ci

      - name: Run Backup
        run: node scripts/backup-postgres-to-blob.mjs
        env:
          PG_DUMP_BIN: /usr/lib/postgresql/17/bin/pg_dump
          POSTGRES_BACKUP_URL: ${{ secrets.POSTGRES_BACKUP_URL }}
          ADL_POSTGRES_URL: ${{ secrets.ADL_POSTGRES_URL }}
          POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          POSTGRES_BACKUP_PREFIX: african-data-layer
